workflows:
  android-release:
    name: HTML Runner - Android Release
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build fat APK (arm + arm64)
        # --target-platform android-arm,android-arm64 produces a single fat APK
        # that installs on both 32-bit (Redmi Go) and 64-bit (DOMO Slate) devices.
        # Do NOT use --split-per-abi here — that produces separate per-arch APKs
        # and the wrong one will fail to install on mismatched devices.
        script: |
          flutter build apk \
            --release \
            --target-platform android-arm,android-arm64
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
